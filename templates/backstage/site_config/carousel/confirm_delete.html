{% extends "backstage/layouts/base.html" %}
{% block title %}Remover Slide — Carrossel{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-8 text-center">
    <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <i class="fa-solid fa-trash text-red-500 text-xl"></i>
    </div>
    <h2 class="text-xl font-bold text-gray-900 mb-2">Remover slide?</h2>
    <p class="text-gray-500 text-sm mb-6">
      O {{ object }} será removido permanentemente do carrossel.
      Esta ação não pode ser desfeita.
    </p>
    <form method="post" class="flex items-center justify-center gap-3">
      {% csrf_token %}
      <a href="{% url 'backstage:carousel_list' %}"
         class="text-sm text-gray-600 hover:text-gray-900 font-medium px-5 py-2.5 rounded-lg border border-gray-200 hover:bg-gray-50 transition-colors">
        Cancelar
      </a>
      <button type="submit"
              class="bg-red-500 hover:bg-red-600 text-white font-semibold text-sm px-5 py-2.5 rounded-lg transition-colors">
        Sim, remover
      </button>
    </form>
  </div>
</div>
{% endblock %}
