<div class="flex items-center gap-2">
  <span class="font-medium {% if instrument.stock < low_stock_threshold %}text-red-600{% else %}text-gray-700{% endif %}">
    {{ instrument.stock }}
  </span>
  <button hx-get="{% url 'manager:edit_stock' pk=instrument.pk %}"
          hx-target="#stock-cell-{{ instrument.pk }}"
          hx-swap="innerHTML"
          class="text-xs text-gray-400 hover:text-amber-600 transition-colors ml-1"
          title="Editar estoque">
    <i class="fa-solid fa-pen-to-square"></i>
  </button>
</div>
