{# empty_state.html — uso: {% include "..." with message="Nenhum..." icon="fa-inbox" %} #}
<div class="flex flex-col items-center justify-center py-16 text-center">
  <i class="{{ icon|default:'fa-solid fa-inbox' }} text-5xl text-gray-300 mb-4"></i>
  <p class="text-gray-500 font-medium">{{ message|default:"Nenhum resultado encontrado." }}</p>
  {% if action_label and action_url %}
  <a href="{{ action_url }}" class="mt-4 inline-flex items-center gap-2 px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-lg transition-colors">
    {{ action_label }}
  </a>
  {% endif %}
</div>
