services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/code
      - /code/.venv
      - /code/theme/static_src/node_modules
    ports:
      - "8000:8000"
    environment:
      DJANGO_ENV: dev
      DEBUG: "True"
      SECRET_KEY: dev-secret-local
    command: python manage.py runserver 0.0.0.0:8000

  tailwind:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/code
      - /code/theme/static_src/node_modules
    command: python manage.py tailwind start
    profiles:
      - tailwind
